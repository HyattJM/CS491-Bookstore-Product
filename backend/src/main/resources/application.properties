# Spring Boot Application Properties
# ===================================================================
# 1. SERVER CONFIGURATION
# ===================================================================
# Standard port configuration for your Spring Boot API layer
server.port=8082

# ===================================================================
# 2. MYSQL DATABASE CONNECTION SETTINGS
# ===================================================================
# Local database connectivity settings (Default MySQL port is 3306)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:rare_finds_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# IMPORTANT: Replace these with your actual local MySQL server root credentials
# Run this query from your local instance of MySQL -> CREATE DATABASE rare_finds_db;
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Dingo6772@}

# ===================================================================
# 3. JPA / HIBERNATE ORM CONFIGURATIONS
# ===================================================================
# Explicitly tells Hibernate to optimize query generation for MySQL database engines
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Automatically matches and structures database tables based on your Java Entity classes
spring.jpa.hibernate.ddl-auto=update

# Prints execution logs to your Antigravity IDE terminal console for runtime debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. DATA SEEDING RULES (EP-02 Framework Integration)
# ===================================================================
# Ensures your data.sql script executes on system startup to pre-load your 100+ rare books
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true